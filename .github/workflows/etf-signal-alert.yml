name: ETF Daily Signal Alert

on:
  schedule:
    # 每天北京时间 18:00 运行（UTC 10:00）
    - cron: '0 10 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  signal-alert:
    runs-on: ubuntu-latest
    # 让 runner 步骤里的 date/python 都按北京时间执行/显示
    env:
      TZ: Asia/Shanghai

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Print runner time
      run: date

    - name: Run signal and send alert
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
      run: |
        # 运行信号脚本，捕获完整输出（--today 拉取当天最新行情）
        python latest_signal.py --config config.yaml --today 2>&1 | tee signal_output.txt

        # 截取从"【今日交易信号】"开始到末尾的内容，并将换行符替换为\n
        SIGNAL_TEXT=$(sed -n '/【今日交易信号】/,$p' signal_output.txt | sed 's/"/\\"/g' | tr '\n' '\\n')

        # 发送完整消息到飞书（静默模式，避免进度信息污染日志）
        curl -s -X POST \
          -H "Content-Type: application/json" \
          -d "{\"param\":\"$SIGNAL_TEXT\"}" \
          "$FEISHU_WEBHOOK"

    - name: Upload signal log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: signal-log-${{ github.run_id }}
        path: signal_output.txt
        retention-days: 7
