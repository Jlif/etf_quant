name: ETF Daily Signal Alert

on:
  schedule:
    # 每天北京时间 15:30 运行（UTC 07:30）
    - cron: '30 7 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  signal-alert:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run signal and send alert
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
      run: |
        # 运行信号脚本，捕获完整输出
        python latest_signal.py --config config.yaml 2>&1 | tee signal_output.txt

        # 读取完整输出并转义
        SIGNAL_TEXT=$(cat signal_output.txt | sed 's/"/\\"/g')

        # 发送完整消息到飞书
        curl -s -X POST "$FEISHU_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "{
            \"msg_type\": \"text\",
            \"content\": {
              \"text\": \"$SIGNAL_TEXT\"
            }
          }"

    - name: Upload signal log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: signal-log-${{ github.run_id }}
        path: signal_output.txt
        retention-days: 7
