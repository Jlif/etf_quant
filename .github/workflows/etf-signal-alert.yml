name: ETF Daily Signal Alert

on:
  schedule:
    # 每天北京时间 18:00 运行（UTC 10:00）
    - cron: '0 10 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  signal-alert:
    runs-on: ubuntu-latest
    # 让 runner 步骤里的 date/python 都按北京时间执行/显示
    env:
      TZ: Asia/Shanghai

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Print runner time
      run: date

    - name: Run signal and send alert
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
      run: |
        # 运行信号脚本，捕获完整输出（--today 拉取当天最新行情）
        python latest_signal.py --config config.yaml --today 2>&1 | tee signal_output.txt

        # 用 Python 提取信号文本并发送标准飞书自定义机器人消息
        python - <<'PY'
        import json
        import os
        import urllib.request

        with open("signal_output.txt", "r", encoding="utf-8") as f:
            lines = f.readlines()

        capture = False
        text_lines = []
        for line in lines:
            if "【今日交易信号】" in line:
                capture = True
            if capture:
                text_lines.append(line)

        text = "".join(text_lines).strip()
        if not text:
            print("未找到信号内容，跳过推送")
            raise SystemExit(0)

        payload = {
            "msg_type": "text",
            "content": {"text": text},
        }
        data = json.dumps(payload, ensure_ascii=False).encode("utf-8")

        req = urllib.request.Request(
            os.environ["FEISHU_WEBHOOK"],
            data=data,
            headers={"Content-Type": "application/json; charset=utf-8"},
            method="POST",
        )
        with urllib.request.urlopen(req) as resp:
            print(resp.read().decode("utf-8"))
        PY

    - name: Upload signal log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: signal-log-${{ github.run_id }}
        path: signal_output.txt
        retention-days: 7
