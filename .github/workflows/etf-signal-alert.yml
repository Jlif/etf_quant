name: ETF Daily Signal Alert

on:
  schedule:
    # 每天北京时间 15:30 运行（UTC 07:30）
    - cron: '30 7 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  signal-alert:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run signal generation
      id: signal
      run: |
        # 运行最新信号脚本，捕获输出
        python latest_signal.py --config config.yaml 2>&1 | tee signal_output.txt

        # 提取信号日期
        SIGNAL_DATE=$(grep '信号日期:' signal_output.txt | head -1 | sed 's/信号日期: //' | xargs)
        echo "SIGNAL_DATE=$SIGNAL_DATE" >> "$GITHUB_ENV"

        # 提取完整的信号内容（从"今日交易信号"到最后的分隔线）
        sed -n '/【今日交易信号】/,/============================================================/p' signal_output.txt | head -60 > signal_content.txt

        # 检查是否有调仓（买入/卖出）
        if grep -qE '\[买入\]|\[卖出\]' signal_output.txt; then
          echo "HAS_REBALANCE=true" >> "$GITHUB_ENV"
        else
          echo "HAS_REBALANCE=false" >> "$GITHUB_ENV"
        fi

    - name: Send Feishu webhook alert
      if: env.HAS_REBALANCE == 'true'
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
      run: |
        # 读取完整的信号内容
        SIGNAL_CONTENT=$(cat signal_content.txt | sed 's/"/\\"/g' | tr '\n' '\\n')

        # 构建飞书消息卡片，发送原始格式的信号内容
        curl -X POST "$FEISHU_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d "{
            \"msg_type\": \"interactive\",
            \"card\": {
              \"config\": {\"wide_screen_mode\": true},
              \"header\": {
                \"title\": {
                  \"tag\": \"plain_text\",
                  \"content\": \"🚨 ETF调仓信号 - ${{ env.SIGNAL_DATE }}\"
                },
                \"template\": \"red\"
              },
              \"elements\": [
                {
                  \"tag\": \"div\",
                  \"text\": {
                    \"tag\": \"lark_md\",
                    \"content\": \"**⚠️ 检测到调仓信号，请关注！**\\n\\n\`\`\`\\n${SIGNAL_CONTENT}\\n\`\`\`\"
                  }
                }
              ]
            }
          }"

    - name: Upload signal log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: signal-log-${{ github.run_id }}
        path: signal_output.txt
        retention-days: 7
