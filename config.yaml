# ============================================
# ETF 轮动策略配置文件
# ============================================

# 数据源配置
data_source:
  provider: akshare

# 回测全局配置
backtest:
  start_date: "20210101"
  cache_dir: "./data_cache"

# 策略列表
# mode: rotation  -> 每天选最强 top_n 个，等权分配
# mode: weighted  -> 按配置 weight 持有，定期再平衡
strategies:
  - name: "原始动量轮动策略"
    description: "A股风格轮动，20日涨幅选最强"
    enabled: false
    mode: rotation
    pool:
      - { code: "510300", name: "沪深300ETF" }
      - { code: "510500", name: "中证500ETF" }
      - { code: "510880", name: "红利ETF" }
      - { code: "159915", name: "创业板ETF" }
    params:
      lookback: 20
      scoring: momentum      # momentum | slope_r2
      top_n: 1

  - name: "跨市场动量轮动"
    description: "红利/创业板/纳指/黄金，20日涨幅选最强"
    enabled: false
    mode: rotation
    start_date: "20150101"    # 策略级起始日（会取各 ETF 实际最晚起始日）
    pool:
      - { code: "510880", name: "红利ETF" }
      - { code: "159915", name: "创业板ETF" }
      - { code: "513100", name: "纳指ETF" }
      - { code: "518880", name: "黄金ETF" }
    params:
      lookback: 20
      scoring: momentum
      top_n: 1

  - name: "跨市场斜率轮动"
    description: "红利/创业板/纳指/黄金，25日斜率*R2得分选最强"
    enabled: false
    mode: rotation
    pool:
      - { code: "510880", name: "红利ETF" }
      - { code: "159915", name: "创业板ETF" }
      - { code: "513100", name: "纳指ETF" }
      - { code: "518880", name: "黄金ETF" }
    params:
      lookback: 25
      scoring: slope_r2
      top_n: 1

  - name: "再平衡组合"
    description: "ETF权重持有，再平衡"
    enabled: false
    mode: weighted
    pool:
      - { code: "510880", name: "红利ETF", weight: 30 }
      - { code: "512040", name: "价值100ETF富国", weight: 50 }
      - { code: "511010", name: "国债ETF", weight: 20 }
    params:
      rebalance_freq: 60

  - name: "动量轮动策略"
    description: "风格自适应轮动：价值/红利用风险调整动量，成长用加速度动量，组内Z-Score后选最强"
    enabled: true
    mode: rotation
    pool:
      # 价值/红利型：60日收益/波动率 × factor_multiplier
      # factor_multiplier >1 表示基本面更优（如股息率高位、PE低位），<1 表示偏弱
      - { code: "512040", name: "价值100ETF富国", type: "价值", factor_multiplier: 1.0 }
      - { code: "515180", name: "红利ETF易方达", type: "红利", factor_multiplier: 1.0 }
      # 成长型：20日收益 × (1 + 加速度)
      - { code: "588080", name: "科创50ETF易方达", type: "成长" }
      - { code: "159915", name: "创业板ETF", type: "成长" }
      # 宽基/商品/债券：沿用既有自适应算法（债券会退化为默认动量并警告）
      - { code: "510300", name: "沪深300ETF", type: "宽基" }
      - { code: "513500", name: "标普500ETF博时", type: "宽基" }
      - { code: "518880", name: "黄金ETF", type: "商品" }
      - { code: "511260", name: "10年国债ETF国泰", type: "债券" }
    params:
      lookback: 22
      scoring: momentum
      adaptive_scoring: true
      benchmark: "沪深300ETF"
      top_n: 1
      absolute_momentum_filter: true
      absolute_momentum_lookback: 9
      absolute_momentum_threshold: 0.0
      safe_haven: "10年国债ETF国泰"
      target_volatility: 0.08
      volatility_lookback: 26
      trailing_stop_pct: 0.07
