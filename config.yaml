# ============================================
# ETF 轮动策略配置文件
# ============================================

# 数据源配置
data_source:
  provider: akshare

# 回测全局配置
backtest:
  start_date: "20160701"
  cache_dir: "./data_cache"

# 策略列表
# mode: rotation  -> 每天选最强 top_n 个，等权分配
# mode: weighted  -> 按配置 weight 持有，定期再平衡
strategies:
  - name: "原始动量轮动策略"
    description: "A股风格轮动，20日涨幅选最强"
    enabled: false
    mode: rotation
    pool:
      - { code: "510300", name: "沪深300ETF" }
      - { code: "510500", name: "中证500ETF" }
      - { code: "510880", name: "红利ETF" }
      - { code: "159915", name: "创业板ETF" }
    params:
      lookback: 20
      scoring: momentum      # momentum | slope_r2
      top_n: 1

  - name: "跨市场动量轮动"
    description: "红利/创业板/纳指/黄金，20日涨幅选最强"
    enabled: false
    mode: rotation
    start_date: "20150101"    # 策略级起始日（会取各 ETF 实际最晚起始日）
    pool:
      - { code: "510880", name: "红利ETF" }
      - { code: "159915", name: "创业板ETF" }
      - { code: "513100", name: "纳指ETF" }
      - { code: "518880", name: "黄金ETF" }
    params:
      lookback: 20
      scoring: momentum
      top_n: 1

  - name: "跨市场斜率轮动"
    description: "红利/创业板/纳指/黄金，25日斜率*R2得分选最强"
    enabled: false
    mode: rotation
    pool:
      - { code: "510880", name: "红利ETF" }
      - { code: "159915", name: "创业板ETF" }
      - { code: "513100", name: "纳指ETF" }
      - { code: "518880", name: "黄金ETF" }
    params:
      lookback: 25
      scoring: slope_r2
      top_n: 1

  - name: "再平衡组合"
    description: "ETF权重持有，再平衡"
    enabled: false
    mode: weighted
    pool:
      - { code: "510880", name: "红利ETF", weight: 30 }
      - { code: "512040", name: "价值100ETF富国", weight: 50 }
      - { code: "511010", name: "国债ETF", weight: 20 }
    params:
      rebalance_freq: 60

  - name: "动量轮动策略"
    description: "A股风格轮动，20日涨幅选最强"
    enabled: true
    mode: rotation
    pool:
      - { code: "512040", name: "价值100ETF富国" }
      - { code: "510300", name: "沪深300ETF" }
      - { code: "510880", name: "红利ETF" }
      - { code: "511010", name: "国债ETF" }
      - { code: "588080", name: "科创50ETF易方达" }
      - { code: "159915", name: "创业板ETF" }
      - { code: "513100", name: "纳指ETF" }
      - { code: "518880", name: "黄金ETF" }
      - { code: "515800", name: "中证800ETF" }
    params:
      lookback: 22
      scoring: momentum      # momentum | slope_r2 | momentum_quality
      top_n: 2
      # 风控参数（均为可选，不配置时保持原始轮动行为）
      # 1. 绝对动量过滤（双重动量防守）：入选标的中自身动量为负的仓位自动切到 safe_haven
      absolute_momentum_filter: true
      absolute_momentum_lookback: 8
      absolute_momentum_threshold: 0.0
      safe_haven: "国债ETF"
      # 2. 目标波动率控制：当组合实际波动率超过目标值时，减仓并切换至 safe_haven
      target_volatility: 0.07
      volatility_lookback: 15
      # 3. 移动止损：持仓标的从高点回撤超过比例时强制清仓
      trailing_stop_pct: 0.08
