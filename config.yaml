# ============================================
# ETF 轮动策略配置文件
# ============================================

# 数据源配置
data_source:
  provider: akshare

# 回测全局配置
backtest:
  start_date: "20200101"
  cache_dir: "./data_cache"

# 策略列表
# mode: rotation  -> 每天选最强 top_n 个，等权分配
# mode: weighted  -> 按配置 weight 持有，定期再平衡
strategies:
  - name: "原始动量轮动策略"
    description: "A股风格轮动，20日涨幅选最强"
    enabled: false
    mode: rotation
    pool:
      - { code: "510300", name: "沪深300ETF" }
      - { code: "510500", name: "中证500ETF" }
      - { code: "510880", name: "红利ETF" }
      - { code: "159915", name: "创业板ETF" }
    params:
      lookback: 20
      scoring: momentum      # momentum | slope_r2
      top_n: 1

  - name: "跨市场动量轮动"
    description: "红利/创业板/纳指/黄金，20日涨幅选最强"
    enabled: false
    mode: rotation
    start_date: "20150101"    # 策略级起始日（会取各 ETF 实际最晚起始日）
    pool:
      - { code: "510880", name: "红利ETF" }
      - { code: "159915", name: "创业板ETF" }
      - { code: "513100", name: "纳指ETF" }
      - { code: "518880", name: "黄金ETF" }
    params:
      lookback: 20
      scoring: momentum
      top_n: 1

  - name: "跨市场斜率轮动"
    description: "红利/创业板/纳指/黄金，25日斜率*R2得分选最强"
    enabled: false
    mode: rotation
    pool:
      - { code: "510880", name: "红利ETF" }
      - { code: "159915", name: "创业板ETF" }
      - { code: "513100", name: "纳指ETF" }
      - { code: "518880", name: "黄金ETF" }
    params:
      lookback: 25
      scoring: slope_r2
      top_n: 1

  - name: "再平衡组合"
    description: "ETF权重持有，再平衡"
    enabled: false
    mode: weighted
    pool:
      - { code: "510880", name: "红利ETF", weight: 30 }
      - { code: "512040", name: "价值100ETF富国", weight: 50 }
      - { code: "511010", name: "国债ETF", weight: 20 }
    params:
      rebalance_freq: 60

  - name: "动量轮动策略"
    description: "A股风格轮动，自适应动量得分（含成长、自由现金流）"
    enabled: true
    mode: rotation
    pool:
      - { code: "512040", name: "价值100ETF富国", type: "价值" }
      - { code: "515180", name: "红利ETF易方达", type: "红利" }
      - { code: "159915", name: "创业板ETF", type: "成长" }
      - { code: "511260", name: "10年国债ETF国泰", type: "" }
      - { code: "510300", name: "沪深300ETF", type: "宽基" }
      - { code: "513500", name: "标普500ETF博时", type: "宽基" }
      - { code: "518880", name: "黄金ETF", type: "商品" }
      - { code: "588080", name: "科创50ETF易方达", type: "成长" }
      - { code: "159740", name: "恒生科技ETF大成", type: "行业" }
      - { code: "512690", name: "酒ETF鹏华", type: "行业" }
      - { code: "159316", name: "港股通创新药ETF易方达", type: "行业" }
      # - { code: "159361", name: "A500ETF易方达", type: "宽基" }
      # - { code: "159201", name: "自由现金流ETF华夏", type: "自由现金流" }
    params:
      lookback: 22
      scoring: momentum
      adaptive_scoring: false
      benchmark: "沪深300ETF"
      top_n: 1
      dynamic_pool: true       # true: ETF 未预热时不纳入候选池，整体回测从最早 ETF 开始
      safe_haven: "10年国债ETF国泰"
      risk_control:
        layer1:
          enabled: true
          ma_lookback: 20
          drawdown_lookback: 5
          drawdown_threshold: 0.15
        layer2:
          enabled: true
          atr_multiplier: 3.0
          atr_lookback: 14
        layer3:
          enabled: true
          target_vol: 0.15
          vol_lookback: 23
          comfort_zone: 0.15
          caution_zone: 0.27
          caution_scale: 0.4
      rebalance_buffer: 0.2
