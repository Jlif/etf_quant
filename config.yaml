# ============================================
# ETF 轮动策略配置文件
# ============================================

# 数据源配置
data_source:
  provider: akshare

# 回测全局配置
backtest:
  start_date: "20190101"
  # 可选：回测截止日（YYYYMMDD）。设置后所有策略只回测到该日，
  # 便于"先在某段时间调参，再用之后一段时间留样验证"。
  # 不设（留空或注释掉）则一直用到最新数据；也可在单个策略下用 end_date 覆盖。
  # end_date: "20240901"
  cache_dir: "./data_cache"

# 策略列表
# mode: rotation  -> 每天选最强 top_n 个，等权分配
# mode: weighted  -> 按配置 weight 持有，定期再平衡
strategies:
  - name: "原始动量轮动策略"
    description: "A股风格轮动，20日涨幅选最强"
    enabled: false
    mode: rotation
    pool:
      - { code: "510300", name: "沪深300ETF" }
      - { code: "510500", name: "中证500ETF" }
      - { code: "510880", name: "红利ETF" }
      - { code: "159915", name: "创业板ETF" }
    params:
      lookback: 20
      scoring: momentum # momentum | slope_r2
      top_n: 1

  - name: "跨市场动量轮动"
    description: "红利/创业板/纳指/黄金，20日涨幅选最强"
    enabled: false
    mode: rotation
    start_date: "20150101" # 策略级起始日（会取各 ETF 实际最晚起始日）
    pool:
      - { code: "510880", name: "红利ETF" }
      - { code: "159915", name: "创业板ETF" }
      - { code: "513100", name: "纳指ETF" }
      - { code: "518880", name: "黄金ETF" }
    params:
      lookback: 20
      scoring: momentum
      top_n: 1

  - name: "跨市场斜率轮动"
    description: "红利/创业板/纳指/黄金，25日斜率*R2得分选最强"
    enabled: false
    mode: rotation
    pool:
      - { code: "510880", name: "红利ETF" }
      - { code: "159915", name: "创业板ETF" }
      - { code: "513100", name: "纳指ETF" }
      - { code: "518880", name: "黄金ETF" }
    params:
      lookback: 25
      scoring: slope_r2
      top_n: 1

  - name: "再平衡组合"
    description: "ETF权重持有，再平衡"
    enabled: false
    mode: weighted
    pool:
      - { code: "510880", name: "红利ETF", weight: 30 }
      - { code: "512040", name: "价值100ETF富国", weight: 50 }
      - { code: "511010", name: "国债ETF", weight: 20 }
    params:
      rebalance_freq: 60

  - name: "动量轮动策略"
    description: "A股风格轮动，自适应动量得分（含成长、自由现金流）"
    enabled: true
    mode: rotation
    pool:
      - { code: "510300", name: "沪深300ETF", type: "宽基" }
      - { code: "512040", name: "价值100ETF富国", type: "价值" }
      - { code: "159361", name: "A500ETF易方达", type: "宽基" }
      - { code: "588080", name: "科创50ETF易方达", type: "宽基" }
      - { code: "159915", name: "创业板ETF", type: "宽基" }
      - { code: "513500", name: "标普500ETF博时", type: "宽基" }
      - { code: "513000", name: "日经225ETF易方达", type: "宽基" }
      - { code: "159263", name: "价值ETF易方达", type: "价值" }
      - { code: "159259", name: "成长ETF易方达", type: "成长" }
      - { code: "513010", name: "恒生科技ETF易方达", type: "行业" }
      - { code: "512690", name: "酒ETF鹏华", type: "行业" }
      - { code: "159870", name: "化工ETF鹏华", type: "行业" }
      - { code: "159316", name: "港股通创新药ETF易方达", type: "行业" }
      - { code: "511880", name: "银华日利ETF", type: "" }
      - { code: "518880", name: "黄金ETF", type: "商品" }
    params:
      lookback: 20
      scoring: momentum
      adaptive_scoring: false
      benchmark: "沪深300ETF"
      top_n: 3
      # true: ETF 未预热时不纳入候选池，整体回测从最早 ETF 开始
      dynamic_pool: true 
      # 风控导致仓位释放后，是否按当日动量得分顺位补选新标的；false 则直接全部买入 safe_haven
      fill_shortfall_by_score: true
      safe_haven: "银华日利ETF"
      risk_control:
        layer1:
          enabled: true
          ma_lookback: 16
          drawdown_lookback: 41
          drawdown_threshold: 0.08
        layer2:
          enabled: true
          atr_multiplier: 2
          atr_lookback: 10
        layer3:
          enabled: true
          vol_lookback: 110
          target_vol: 0.15
          comfort_zone: 0.25
          caution_zone: 0.4
          # 平滑过渡参数：越大则波动率越接近 caution_zone 时仓位下降越快，建议 2.0~4.0
          transition_power: 4
